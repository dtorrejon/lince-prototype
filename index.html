<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

// ============================================================
// 1. MODELO DE PRIORIZACIÓN — Sistema basado en reglas
//    Pedagógicamente transparente: cada regla aporta un peso fijo.
//    Esto permite mostrar al profesional QUÉ ha contado y CUÁNTO.
// ============================================================

const RULES = [
  // Demográficas
  { id: 'edad_75',  label: 'Edad ≥ 75 años',                   weight: 20, category: 'Demográfico', test: p => p.edad >= 75 },
  { id: 'edad_65',  label: 'Edad 65–74 años',                  weight: 10, category: 'Demográfico', test: p => p.edad >= 65 && p.edad < 75 },
  { id: 'edad_50',  label: 'Edad 50–64 años',                  weight: 5,  category: 'Demográfico', test: p => p.edad >= 50 && p.edad < 65 },

  // Comorbilidades
  { id: 'ic',       label: 'Insuficiencia cardíaca',           weight: 18, category: 'Comorbilidad', test: p => p.patologias.includes('IC') },
  { id: 'erc',      label: 'Enfermedad renal crónica',         weight: 15, category: 'Comorbilidad', test: p => p.patologias.includes('ERC') },
  { id: 'epoc',     label: 'EPOC',                             weight: 12, category: 'Comorbilidad', test: p => p.patologias.includes('EPOC') },
  { id: 'dm',       label: 'Diabetes mellitus',                weight: 10, category: 'Comorbilidad', test: p => p.patologias.includes('DM') },
  { id: 'hta',      label: 'Hipertensión arterial',            weight: 8,  category: 'Comorbilidad', test: p => p.patologias.includes('HTA') },

  // Asistenciales
  { id: 'hosp',     label: 'Hospitalización en últimos 12 meses', weight: 20, category: 'Histórico', test: p => p.hospitalizacion12m },
  { id: 'urg',      label: 'Visita a urgencias en últimos 6 meses', weight: 15, category: 'Histórico', test: p => p.urgencias6m },
  { id: 'sin_revision', label: '> 180 días sin revisión',       weight: 10, category: 'Histórico', test: p => p.diasUltimaRevision > 180 },

  // Manejo
  { id: 'polifarmacia', label: 'Polifarmacia (> 5 fármacos)',   weight: 10, category: 'Manejo',     test: p => p.numFarmacos > 5 },
  { id: 'adherencia',   label: 'Mala adherencia al tratamiento',weight: 12, category: 'Manejo',     test: p => p.adherencia === 'baja' },

  // Clínicos actuales
  { id: 'sintomas', label: 'Síntomas activos reportados',      weight: 15, category: 'Clínico',     test: p => p.sintomasActivos },
  { id: 'constantes', label: 'Constantes/analítica fuera de rango', weight: 15, category: 'Clínico', test: p => p.constantesAnormales },
];

const THRESHOLDS = { alto: 70, medio: 35 };

function calculateRisk(patient) {
  const triggered = RULES.filter(r => r.test(patient));
  const score = triggered.reduce((s, r) => s + r.weight, 0);
  const maxScore = RULES.reduce((s, r) => s + r.weight, 0);
  const level = score >= THRESHOLDS.alto ? 'alto' : score >= THRESHOLDS.medio ? 'medio' : 'bajo';
  return { score, maxScore, level, factors: triggered };
}

function getRecommendation(level, patient) {
  if (level === 'alto') {
    return {
      accion: 'Cita presencial en 24–48 h',
      icono: 'urgent',
      detalle: 'Riesgo elevado de descompensación. Valorar revisión clínica completa, ajuste terapéutico y educación al paciente y familia.',
      tag: 'Prioritario'
    };
  }
  if (level === 'medio') {
    return {
      accion: 'Revisión telefónica programada (5–7 días)',
      icono: 'phone',
      detalle: 'Confirmar adherencia, sintomatología y necesidad de cita presencial. Reevaluar a las 2 semanas.',
      tag: 'Seguimiento activo'
    };
  }
  return {
    accion: 'Seguimiento estándar según protocolo',
    icono: 'calendar',
    detalle: 'Mantener pauta de revisión habitual. Revaluar si aparecen nuevos síntomas o cambios en constantes.',
    tag: 'Estándar'
  };
}

// ============================================================
// 1.bis MODELO DE IA — Regresión logística entrenada en cliente
//       Complementa al sistema de reglas con un modelo estadístico.
//       Entrenamiento: gradient descent + regularización L2 sobre
//       un dataset sintético generado con outcome conocido.
// ============================================================

const FEATURE_NAMES = [
  'Edad (norm)', 'Nº comorbilidades', 'Nº fármacos',
  'Hosp. 12m', 'Urgencias 6m',
  'Adherencia baja', 'Adherencia media',
  'Síntomas activos', 'Constantes anormales',
  'Días sin revisión (norm)',
  'Tiene IC', 'Tiene ERC', 'Tiene EPOC', 'Tiene DM',
];

function vectorize(p) {
  return [
    Math.min(p.edad / 100, 1),
    p.patologias.length,
    p.numFarmacos,
    p.hospitalizacion12m ? 1 : 0,
    p.urgencias6m ? 1 : 0,
    p.adherencia === 'baja'  ? 1 : 0,
    p.adherencia === 'media' ? 1 : 0,
    p.sintomasActivos ? 1 : 0,
    p.constantesAnormales ? 1 : 0,
    Math.min(p.diasUltimaRevision / 365, 2),
    p.patologias.includes('IC')   ? 1 : 0,
    p.patologias.includes('ERC')  ? 1 : 0,
    p.patologias.includes('EPOC') ? 1 : 0,
    p.patologias.includes('DM')   ? 1 : 0,
  ];
}

// PRNG determinista (Mulberry32) para reproducibilidad de la demo
function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Generador sintético: pacientes con outcome (descompensación a 90d)
// modelado con un proceso de Bernoulli a partir de una logit latente.
function generateSyntheticDataset(n) {
  const rnd = mulberry32(42);
  const data = [];
  const allPat = ['HTA','DM','EPOC','IC','ERC','Asma','Obesidad','Depresión'];
  for (let i = 0; i < n; i++) {
    const edad = Math.floor(20 + rnd() * 75);
    const numPat = Math.min(8, Math.floor(rnd() * (edad > 60 ? 5 : 2.5)));
    const patologias = [];
    while (patologias.length < numPat) {
      const c = allPat[Math.floor(rnd() * allPat.length)];
      if (!patologias.includes(c)) patologias.push(c);
    }
    const p = {
      edad, patologias,
      numFarmacos: Math.min(15, numPat + Math.floor(rnd() * 4)),
      hospitalizacion12m: rnd() < (0.05 + numPat * 0.06),
      urgencias6m:        rnd() < (0.08 + numPat * 0.05),
      adherencia: rnd() < 0.65 ? 'alta' : (rnd() < 0.7 ? 'media' : 'baja'),
      sintomasActivos:     rnd() < (0.10 + numPat * 0.07),
      constantesAnormales: rnd() < (0.10 + numPat * 0.06),
      diasUltimaRevision:  Math.floor(rnd() * 600),
    };
    let z = -3.5
      + 0.04 * p.edad
      + 0.50 * p.patologias.length
      + 0.10 * p.numFarmacos
      + 1.70 * (p.hospitalizacion12m ? 1 : 0)
      + 1.10 * (p.urgencias6m ? 1 : 0)
      + 0.90 * (p.adherencia === 'baja' ? 1 : 0)
      + 1.40 * (p.sintomasActivos ? 1 : 0)
      + 1.20 * (p.constantesAnormales ? 1 : 0)
      + 1.00 * (p.patologias.includes('IC')  ? 1 : 0)
      + 0.80 * (p.patologias.includes('ERC') ? 1 : 0);
    const prob = 1 / (1 + Math.exp(-z));
    const y = rnd() < prob ? 1 : 0;
    data.push({ x: vectorize(p), y });
  }
  return data;
}

// Regresión logística por descenso de gradiente con L2
function trainLogisticRegression(dataset, opts = {}) {
  const epochs = opts.epochs ?? 250;
  const lr     = opts.lr     ?? 0.15;
  const lambda = opts.lambda ?? 0.005;
  const n = dataset.length;
  const d = dataset[0].x.length;
  let w = new Array(d).fill(0);
  let b = 0;
  const lossHistory = [];
  const sigmoid = z => 1 / (1 + Math.exp(-z));

  for (let e = 0; e < epochs; e++) {
    const dw = new Array(d).fill(0);
    let db = 0, loss = 0;
    for (let i = 0; i < n; i++) {
      const { x, y } = dataset[i];
      let z = b;
      for (let j = 0; j < d; j++) z += w[j] * x[j];
      const p = sigmoid(z);
      const err = p - y;
      for (let j = 0; j < d; j++) dw[j] += err * x[j];
      db += err;
      const eps = 1e-15;
      loss += -(y * Math.log(p + eps) + (1 - y) * Math.log(1 - p + eps));
    }
    for (let j = 0; j < d; j++) w[j] -= lr * (dw[j] / n + lambda * w[j]);
    b -= lr * (db / n);
    lossHistory.push(loss / n);
  }
  return { w, b, lossHistory, epochs };
}

function predictProb(model, x) {
  let z = model.b;
  for (let j = 0; j < x.length; j++) z += model.w[j] * x[j];
  return 1 / (1 + Math.exp(-z));
}

// Online learning: un paso de SGD sobre un único ejemplo (x, y).
// Se aplica tras cada decisión humana clara. lr bajo para evitar que
// pocas decisiones distorsionen el modelo entrenado offline.
function onlineUpdate(model, x, y, opts = {}) {
  const lr = opts.lr ?? 0.02;
  const lambda = opts.lambda ?? 0.005;
  let z = model.b;
  for (let j = 0; j < x.length; j++) z += model.w[j] * x[j];
  const p = 1 / (1 + Math.exp(-z));
  const err = p - y;
  const newW = model.w.map((wj, j) => wj - lr * (err * x[j] + lambda * wj));
  const newB = model.b - lr * err;
  return { ...model, w: newW, b: newB };
}

// Deriva el outcome implícito de una decisión profesional.
// Solo emite señal cuando la decisión es interpretable sin ambigüedad.
function deriveImplicitOutcome(decisionType, ruleLevel) {
  if (decisionType === 'confirmada') {
    if (ruleLevel === 'alto') return 1; // modelo acertó al priorizar
    if (ruleLevel === 'bajo') return 0; // modelo acertó al no priorizar
  }
  if (decisionType === 'descartada') {
    if (ruleLevel === 'alto') return 0; // modelo sobrepriorizó
  }
  // 'medio' confirmado, 'modificada' o cualquier otra combinación: señal ambigua
  return null;
}

// AUC ROC vía Mann–Whitney U
function computeAUC(model, dataset) {
  const probs = dataset.map(d => ({ p: predictProb(model, d.x), y: d.y }));
  const pos = probs.filter(d => d.y === 1).map(d => d.p);
  const neg = probs.filter(d => d.y === 0).map(d => d.p);
  if (!pos.length || !neg.length) return 0.5;
  let wins = 0;
  for (const a of pos) for (const c of neg) {
    if (a > c) wins++; else if (a === c) wins += 0.5;
  }
  return wins / (pos.length * neg.length);
}

// Conversión P(90d) → P(t días) asumiendo hazard constante
function temporalProbability(p90, days) {
  const H = -Math.log(Math.max(1e-6, 1 - p90)) / 90;
  return 1 - Math.exp(-H * days);
}

// ============================================================
// 1.ter NLP — Análisis ligero de notas clínicas
// ============================================================

const CLINICAL_TERMS = {
  alto:  { weight: 3, color:'var(--high-fg)', bg:'var(--high-bg)', terms:['disnea','edemas','dolor torácico','síncope','exacerbación','descompensación','agudización','crisis','sangrado','convulsión','ictus','trombosis','sepsis','deterioro'] },
  medio: { weight: 2, color:'var(--med-fg)',  bg:'var(--med-bg)',  terms:['tos persistente','tos productiva','astenia','fatiga','vértigo','mareo','glucemia elevada','hba1c','creatinina','fibrilación','arritmia','olvida','al alza','persistente'] },
  bajo:  { weight:-1, color:'var(--low-fg)',  bg:'var(--low-bg)',  terms:['estable','controlado','sin agudizaciones','asintomático','rutina','preventiva'] },
};

function analyzeNotes(text) {
  if (!text) return { score: 0, hits: [] };
  const norm = text.toLowerCase();
  const hits = [];
  let score = 0;
  Object.entries(CLINICAL_TERMS).forEach(([severity, data]) => {
    data.terms.forEach(term => {
      let from = 0;
      while (true) {
        const idx = norm.indexOf(term, from);
        if (idx === -1) break;
        hits.push({ term, severity, weight: data.weight, start: idx, end: idx + term.length });
        score += data.weight;
        from = idx + term.length;
      }
    });
  });
  return { score: Math.max(0, score), hits: hits.sort((a,b) => a.start - b.start) };
}

// ============================================================
// 1.quater kNN — Similaridad por distancia euclídea
// ============================================================

function euclideanDistance(a, b) {
  let s = 0;
  for (let i = 0; i < a.length; i++) s += (a[i] - b[i]) ** 2;
  return Math.sqrt(s);
}

function findSimilarPatients(target, cohort, k = 3) {
  const tv = vectorize(target);
  return cohort
    .filter(p => p.id !== target.id)
    .map(p => ({ patient: p, distance: euclideanDistance(tv, vectorize(p)) }))
    .sort((a,b) => a.distance - b.distance)
    .slice(0, k);
}

// ============================================================
// 1.quinquies STORAGE — Persistencia local (localStorage)
//   Versionado por clave para futuras migraciones.
//   Falla silenciosamente: si el navegador bloquea localStorage
//   (modo privado estricto, cuotas) la app sigue funcionando en RAM.
// ============================================================

const Storage = {
  PATIENTS_KEY:    'lince:patients:v1',
  ADAPTATIONS_KEY: 'lince:adaptations:v1',

  loadPatients() {
    try {
      const raw = localStorage.getItem(this.PATIENTS_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) && parsed.length > 0 ? parsed : null;
    } catch (e) { return null; }
  },
  savePatients(patients) {
    try { localStorage.setItem(this.PATIENTS_KEY, JSON.stringify(patients)); }
    catch (e) { console.warn('Storage.savePatients:', e); }
  },
  loadAdaptations() {
    try {
      const raw = localStorage.getItem(this.ADAPTATIONS_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) { return []; }
  },
  saveAdaptations(adaptations) {
    try { localStorage.setItem(this.ADAPTATIONS_KEY, JSON.stringify(adaptations)); }
    catch (e) { console.warn('Storage.saveAdaptations:', e); }
  },
  clearAll() {
    try {
      localStorage.removeItem(this.PATIENTS_KEY);
      localStorage.removeItem(this.ADAPTATIONS_KEY);
    } catch (e) {}
  },
  isAvailable() {
    try {
      const k = '__lince_test__';
      localStorage.setItem(k, '1');
      localStorage.removeItem(k);
      return true;
    } catch (e) { return false; }
  }
};

function DonutChart({ data, total }) {
  // SVG donut puro, sin librerías. Calculamos arcos por proporción.
  const cx = 90, cy = 90, r = 65, sw = 24;
  let acc = 0;
  const arcs = data.map(d => {
    const start = acc / total;
    acc += d.value;
    const end = acc / total;
    const a0 = start * 2 * Math.PI - Math.PI / 2;
    const a1 = end   * 2 * Math.PI - Math.PI / 2;
    const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const large = (end - start) > 0.5 ? 1 : 0;
    const path = total === 0 ? '' : `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
    return { path, color: d.color };
  });
  return (
    <svg viewBox="0 0 180 180" className="w-44 h-44">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line)" strokeWidth={sw}/>
      {arcs.map((a, i) => a.path && (
        <path key={i} d={a.path} fill="none" stroke={a.color} strokeWidth={sw} strokeLinecap="butt"/>
      ))}
      <text x={cx} y={cy-4} textAnchor="middle" className="font-display number-display" style={{ fontSize:32, fontWeight:600, fill:'var(--ink)' }}>{total}</text>
      <text x={cx} y={cy+16} textAnchor="middle" style={{ fontSize:10, fill:'var(--ink-3)', letterSpacing:'0.1em' }}>PACIENTES</text>
    </svg>
  );
}

function Dashboard({ patients, scored, setView, openPatient, mlProbs, adaptations }) {
  const dist = useMemo(() => {
    const c = { alto:0, medio:0, bajo:0 };
    scored.forEach(s => c[s.level]++);
    return c;
  }, [scored]);

  const decisionStats = useMemo(() => {
    const c = { confirmadas:0, modificadas:0, descartadas:0, pendientes:0 };
    scored.forEach(s => {
      if (!s.patient.decision) c.pendientes++;
      else if (s.patient.decision.tipo === 'confirmada') c.confirmadas++;
      else if (s.patient.decision.tipo === 'modificada') c.modificadas++;
      else c.descartadas++;
    });
    return c;
  }, [scored]);

  // Métrica de validación humana: tasa de aceptación = confirmadas / decididas
  const totalDecididas = decisionStats.confirmadas + decisionStats.modificadas + decisionStats.descartadas;
  const tasaAceptacion = totalDecididas > 0 ? (decisionStats.confirmadas / totalDecididas) : 0;

  // Comparativa reglas vs ML
  const concordancia = useMemo(() => {
    if (!mlProbs || Object.keys(mlProbs).length === 0) return null;
    let acuerdo = 0, total = 0;
    scored.forEach(s => {
      const p = mlProbs[s.patient.id];
      if (p === undefined) return;
      const mlLevel = p >= 0.5 ? 'alto' : p >= 0.2 ? 'medio' : 'bajo';
      if (mlLevel === s.level) acuerdo++;
      total++;
    });
    return total > 0 ? acuerdo / total : null;
  }, [scored, mlProbs]);

  const priorizados = scored
    .filter(s => s.level !== 'bajo')
    .sort((a,b) => b.score - a.score)
    .slice(0, 5);

  return (
    <div className="fade-in">
      <header className="mb-8">
        <div className="text-[11px] uppercase tracking-widest text-[var(--ink-3)] font-semibold mb-1">Panel general</div>
        <h1 className="font-display text-4xl font-semibold tracking-tight">Visión global de la cohorte</h1>
        <p className="text-[var(--ink-2)] mt-2 max-w-2xl">Resumen agregado de la situación de los pacientes activos. Use esta vista para reorganizar agendas y detectar carga prioritaria.</p>
      </header>

      {/* KPIs y donut */}
      <div className="grid grid-cols-12 gap-4 mb-4">
        <div className="col-span-4 border hairline bg-white rounded-md p-6 flex items-center gap-6">
          <DonutChart total={patients.length} data={[
            { value: dist.alto,  color:'#9A2B0E' },
            { value: dist.medio, color:'#B7853A' },
            { value: dist.bajo,  color:'#4F7A5E' },
          ]}/>
          <div className="space-y-2.5 text-sm">
            <Legend dot="#9A2B0E" label="Alto"  value={dist.alto}/>
            <Legend dot="#B7853A" label="Medio" value={dist.medio}/>
            <Legend dot="#4F7A5E" label="Bajo"  value={dist.bajo}/>
          </div>
        </div>

        <KpiCard col="col-span-2" label="Riesgo alto"  value={dist.alto}  accent="var(--high-fg)" sub="requieren acción"/>
        <KpiCard col="col-span-2" label="Pendientes"   value={decisionStats.pendientes} accent="var(--ink)" sub="sin decisión"/>
        <KpiCard col="col-span-2" label="Confirmadas"  value={decisionStats.confirmadas} accent="var(--sage)" sub="aceptadas"/>
        <KpiCard col="col-span-2" label="Modificadas"  value={decisionStats.modificadas} accent="var(--accent-2)" sub="ajustadas"/>
      </div>

      {/* Métricas de validación humana y de modelo */}
      <div className="grid grid-cols-12 gap-4 mb-8">
        <div className="col-span-6 border hairline bg-white rounded-md p-6">
          <div className="text-[10px] uppercase tracking-widest font-semibold text-[var(--ink-3)] mb-3 flex items-center gap-1.5">
            <Icon.Pulse/> Validación humana del sistema
          </div>
          <div className="flex items-end justify-between mb-3">
            <div>
              <div className="font-display number-display text-5xl font-semibold leading-none">{(tasaAceptacion * 100).toFixed(0)}<span className="text-2xl text-[var(--ink-3)]">%</span></div>
              <div className="text-xs text-[var(--ink-3)] mt-1">tasa de aceptación de la recomendación</div>
            </div>
            <div className="text-xs text-[var(--ink-3)] text-right">
              <div>{decisionStats.confirmadas} confirmadas</div>
              <div>{decisionStats.modificadas} modificadas · {decisionStats.descartadas} descartadas</div>
              <div className="mt-1">{totalDecididas} de {patients.length} decididas</div>
            </div>
          </div>
          <StackedBar
            segments={[
              { v: decisionStats.confirmadas, color:'var(--sage)',    label:'Conf.' },
              { v: decisionStats.modificadas, color:'var(--med-fg)',  label:'Mod.'  },
              { v: decisionStats.descartadas, color:'var(--high-fg)', label:'Desc.' },
              { v: decisionStats.pendientes,  color:'var(--line-2)',  label:'Pend.' },
            ]}
            total={patients.length}
          />
        </div>

        <div className="col-span-6 border hairline bg-white rounded-md p-6">
          <div className="text-[10px] uppercase tracking-widest font-semibold text-[var(--ink-3)] mb-3 flex items-center gap-1.5">
            <Icon.Brain/> Concordancia entre motores
            {adaptations && adaptations.length > 0 && (
              <span className="ml-auto text-[10px] font-mono px-2 py-0.5 rounded-full" style={{ background:'var(--accent-2)', color:'var(--paper)' }}>
                +{adaptations.length} adapt.
              </span>
            )}
          </div>
          {concordancia === null ? (
            <div className="text-sm text-[var(--ink-3)] flex items-center gap-2"><Icon.Spark/> Esperando al modelo…</div>
          ) : (
            <>
              <div className="flex items-end justify-between mb-3">
                <div>
                  <div className="font-display number-display text-5xl font-semibold leading-none">{(concordancia * 100).toFixed(0)}<span className="text-2xl text-[var(--ink-3)]">%</span></div>
                  <div className="text-xs text-[var(--ink-3)] mt-1">acuerdo reglas ↔ regresión logística</div>
                </div>
                <button onClick={() => setView('model')} className="text-xs font-semibold flex items-center gap-1.5 hover:underline">
                  Ver modelo <Icon.Arrow/>
                </button>
              </div>
              <div className="text-xs text-[var(--ink-2)] leading-relaxed">
                {adaptations && adaptations.length > 0
                  ? <>El modelo se ha adaptado <span className="font-semibold">{adaptations.length}</span> {adaptations.length === 1 ? 'vez' : 'veces'} con las decisiones registradas. Las discrepancias deberían reducirse con el uso.</>
                  : 'Cuando ambos sistemas coinciden la confianza es alta. Las discrepancias son oportunidades para revisar reglas o reentrenar el modelo.'}
              </div>
            </>
          )}
        </div>
      </div>

      {/* Top priorizados */}
      <section className="border hairline bg-white rounded-md">
        <div className="flex items-center justify-between px-6 py-4 border-b hairline">
          <div>
            <h2 className="font-display text-xl font-semibold">Pacientes priorizados</h2>
            <div className="text-xs text-[var(--ink-3)] mt-0.5">Top 5 por puntuación de riesgo</div>
          </div>
          <button onClick={() => setView('patients')} className="text-sm font-semibold flex items-center gap-1.5 hover:underline">
            Ver todos <Icon.Arrow/>
          </button>
        </div>
        <div className="divide-y hairline">
          {priorizados.length === 0 && (
            <div className="px-6 py-8 text-center text-[var(--ink-3)]">No hay pacientes con riesgo medio o alto.</div>
          )}
          {priorizados.map(s => (
            <PatientRow key={s.patient.id} scored={s} onClick={() => openPatient(s.patient.id)} mlProb={mlProbs && mlProbs[s.patient.id]}/>
          ))}
        </div>
      </section>

      <DistributionByCategory scored={scored}/>
    </div>
  );
}

function StackedBar({ segments, total }) {
  if (total === 0) return <div className="h-2 rounded-full" style={{ background:'var(--paper-2)' }}/>;
  return (
    <div>
      <div className="flex h-2 rounded-full overflow-hidden">
        {segments.map((s, i) => s.v > 0 && (
          <div key={i} style={{ width: `${(s.v/total)*100}%`, background: s.color }}/>
        ))}
      </div>
      <div className="flex flex-wrap gap-3 mt-2 text-[11px] text-[var(--ink-3)]">
        {segments.map((s, i) => (
          <span key={i} className="flex items-center gap-1.5">
            <span className="w-2 h-2 rounded-sm" style={{ background: s.color }}/>
            {s.label} <span className="font-mono">{s.v}</span>
          </span>
        ))}
      </div>
    </div>
  );
}

function Legend({ dot, label, value }) {
  return (
    <div className="flex items-center gap-2">
      <span className="w-2.5 h-2.5 rounded-full" style={{ background: dot }}/>
      <span className="text-[var(--ink-2)] w-12">{label}</span>
      <span className="font-mono number-display font-semibold">{value}</span>
    </div>
  );
}

function KpiCard({ col, label, value, accent, sub }) {
  return (
    <div className={cls('border hairline bg-white rounded-md p-5 flex flex-col justify-between', col)}>
      <div className="text-[11px] uppercase tracking-widest font-semibold text-[var(--ink-3)]">{label}</div>
      <div className="font-display number-display text-5xl font-semibold mt-3" style={{ color: accent }}>{value}</div>
      <div className="text-xs text-[var(--ink-3)] mt-1">{sub}</div>
    </div>
  );
}

function DistributionByCategory({ scored }) {
  // Cuenta cuántos pacientes tienen cada factor activo.
  const counts = RULES.map(r => ({
    rule: r,
    n: scored.filter(s => s.factors.find(f => f.id === r.id)).length,
  })).sort((a,b) => b.n - a.n).slice(0, 10);

  const max = Math.max(1, ...counts.map(c => c.n));

  return (
    <section className="mt-8 border hairline bg-white rounded-md">
      <div className="px-6 py-4 border-b hairline">
        <h2 className="font-display text-xl font-semibold">Factores más prevalentes</h2>
        <div className="text-xs text-[var(--ink-3)] mt-0.5">Frecuencia de cada regla disparada en la cohorte</div>
      </div>
      <div className="p-6 space-y-2.5">
        {counts.map(c => (
          <div key={c.rule.id} className="flex items-center gap-4">
            <div className="w-72 text-sm">
              <span className="text-[10px] uppercase tracking-wider text-[var(--ink-3)] mr-2">{c.rule.category}</span>
              {c.rule.label}
            </div>
            <div className="flex-1 h-2 rounded-full overflow-hidden" style={{ background:'var(--paper-2)' }}>
              <div className="h-full rounded-full" style={{ width: `${(c.n/max)*100}%`, background:'var(--primary)' }}/>
            </div>
            <div className="w-12 text-right font-mono number-display text-sm">{c.n}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function PatientRow({ scored, onClick, mlProb }) {
  const p = scored.patient;
  return (
    <button onClick={onClick} className="w-full grid grid-cols-12 items-center gap-4 px-6 py-4 hover:bg-[var(--paper-2)] transition text-left">
      <div className="col-span-4">
        <div className="font-semibold">{p.nombre}</div>
        <div className="text-xs text-[var(--ink-3)]">{p.id} · {p.edad}a · {p.sexo}</div>
      </div>
      <div className="col-span-3 text-xs text-[var(--ink-2)] truncate">

// 8. LISTA DE PACIENTES (con filtros)

function PatientsList({ scored, openPatient, mlProbs }) {
  const [q, setQ] = useState('');
  const [filter, setFilter] = useState('todos');
  const [sort, setSort] = useState('score_desc');

  const filtered = useMemo(() => {
    let out = scored;
    if (filter !== 'todos') out = out.filter(s => s.level === filter);
    if (q.trim()) {
      const t = q.toLowerCase();
      out = out.filter(s => s.patient.nombre.toLowerCase().includes(t) || s.patient.id.toLowerCase().includes(t));
    }
    if (sort === 'score_desc') out = [...out].sort((a,b) => b.score - a.score);
    if (sort === 'score_asc')  out = [...out].sort((a,b) => a.score - b.score);
    if (sort === 'nombre')     out = [...out].sort((a,b) => a.patient.nombre.localeCompare(b.patient.nombre));
    if (sort === 'ml_desc' && mlProbs) out = [...out].sort((a,b) => (mlProbs[b.patient.id]||0) - (mlProbs[a.patient.id]||0));
    return out;
  }, [scored, q, filter, sort, mlProbs]);

  return (
    <div className="fade-in">
      <header className="mb-6">
        <div className="text-[11px] uppercase tracking-widest text-[var(--ink-3)] font-semibold mb-1">Cohorte activa</div>
        <h1 className="font-display text-4xl font-semibold tracking-tight">Pacientes</h1>
      </header>

      <div className="flex items-center gap-3 mb-4 flex-wrap">
        <div className="relative">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[var(--ink-3)]"><Icon.Search/></span>
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Buscar por nombre o ID..."
            className="pl-9 pr-4 py-2 border hairline rounded-md bg-white text-sm w-72"/>
        </div>
        <div className="flex border hairline rounded-md bg-white overflow-hidden">
          {['todos','alto','medio','bajo'].map(f => (
            <button key={f} onClick={() => setFilter(f)}
              className={cls('px-3 py-2 text-sm capitalize transition', filter === f ? 'bg-[var(--primary)] text-[var(--paper)]' : 'hover:bg-[var(--paper-2)]')}>
              {f}
            </button>
          ))}
        </div>
        <select value={sort} onChange={e => setSort(e.target.value)}
          className="border hairline rounded-md bg-white text-sm px-3 py-2">
          <option value="score_desc">Reglas (mayor primero)</option>
          <option value="score_asc">Reglas (menor primero)</option>
          <option value="ml_desc">Modelo ML (mayor primero)</option>
          <option value="nombre">Nombre A→Z</option>
        </select>
        <span className="ml-auto text-sm text-[var(--ink-3)]">{filtered.length} resultados</span>
      </div>

      <div className="border hairline bg-white rounded-md overflow-hidden">
        <div className="grid grid-cols-12 gap-4 px-6 py-3 text-[10px] uppercase tracking-widest text-[var(--ink-3)] font-semibold border-b hairline" style={{ background:'var(--paper-2)' }}>
          <div className="col-span-4">Paciente</div>
          <div className="col-span-3">Comorbilidades</div>
          <div className="col-span-2">Nivel</div>
          <div className="col-span-1 text-right">Reglas</div>
          <div className="col-span-1 text-right">P(90d)</div>
          <div className="col-span-1"></div>
        </div>
        <div className="divide-y hairline">
          {filtered.length === 0 && <div className="px-6 py-12 text-center text-[var(--ink-3)]">Sin coincidencias.</div>}
          {filtered.map(s => <PatientRow key={s.patient.id} scored={s} onClick={() => openPatient(s.patient.id)} mlProb={mlProbs && mlProbs[s.patient.id]}/>)}
        </div>
      </div>
    </div>
  );
}

  }, [scored]);

  return (

function DecisionTag({ tipo }) {
  const map = {
    confirmada:  { label:'Confirmada',  bg:'var(--low-bg)',  fg:'var(--low-fg)' },
    modificada:  { label:'Modificada',  bg:'var(--med-bg)',  fg:'var(--med-fg)' },
    descartada:  { label:'Descartada',  bg:'var(--high-bg)', fg:'var(--high-fg)' },
  };
  const m = map[tipo] || map.modificada;
  return <span className="pill px-2 py-1 rounded" style={{ background: m.bg, color: m.fg }}>{m.label}</span>;
}

function DecisionPanel({ patient, recommendation, onDecision }) {
  const [mode, setMode] = useState(null); // null | 'modificar' | 'descartar'
  const [accion, setAccion] = useState('');
  const [motivo, setMotivo] = useState('');

  const confirm = () => onDecision(patient.id, { tipo:'confirmada', detalle: `Confirma: ${recommendation.accion}`, ts: Date.now() });
  const submitMod = () => {
    if (!accion.trim()) return;
    onDecision(patient.id, { tipo:'modificada', detalle:`Acción definida: ${accion}${motivo ? ' · '+motivo : ''}`, ts: Date.now() });
    setMode(null); setAccion(''); setMotivo('');
  };
  const submitDis = () => {
    onDecision(patient.id, { tipo:'descartada', detalle:`Descartada${motivo ? ': '+motivo : ''}`, ts: Date.now() });
    setMode(null); setMotivo('');
  };

  return (
    <section className="border hairline bg-white rounded-md">
      <div className="px-5 py-4 border-b hairline">
        <div className="text-[10px] uppercase tracking-widest font-semibold text-[var(--ink-3)]">Decisión profesional</div>
        <h2 className="font-display text-lg font-semibold mt-0.5">Registrar criterio clínico</h2>
      </div>
      <div className="p-5">
        {patient.decision && (
          <div className="mb-4 p-3 rounded-md flex items-start gap-2" style={{ background:'var(--paper-2)' }}>
            <DecisionTag tipo={patient.decision.tipo}/>
            <div className="flex-1 text-sm">
              <div>{patient.decision.detalle}</div>
              <div className="text-xs text-[var(--ink-3)] mt-0.5">{fmtDate(patient.decision.ts)}</div>
            </div>

function TemporalRiskCurve({ prob90 }) {
  const days = [7, 30, 60, 90, 180, 365];
  const points = days.map(d => ({ d, p: temporalProbability(prob90, d) }));
  const w = 280, h = 90, padX = 20, padY = 12;
  const xScale = i => padX + (i / (points.length - 1)) * (w - 2 * padX);
  const yScale = p => h - padY - p * (h - 2 * padY);
  const path = points.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i)} ${yScale(pt.p)}`).join(' ');
  const area = path + ` L ${xScale(points.length - 1)} ${h - padY} L ${xScale(0)} ${h - padY} Z`;

  return (
    <div className="mt-5">
      <div className="text-[10px] uppercase tracking-widest font-semibold text-[var(--ink-3)] mb-2">Probabilidad acumulada en el tiempo</div>
      <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
        <path d={area} fill="var(--high-bg)" opacity="0.6"/>
        <path d={path} fill="none" stroke="var(--high-fg)" strokeWidth="1.5"/>
        {points.map((pt, i) => (
          <g key={i}>
            <circle cx={xScale(i)} cy={yScale(pt.p)} r="2.5" fill="var(--high-fg)"/>
            <text x={xScale(i)} y={h - 2} textAnchor="middle" style={{ fontSize:9, fill:'var(--ink-3)' }}>{pt.d}d</text>
            <text x={xScale(i)} y={yScale(pt.p) - 6} textAnchor="middle" style={{ fontSize:9, fill:'var(--ink-2)', fontWeight:600 }}>{(pt.p*100).toFixed(0)}%</text>
          </g>
        ))}
      </svg>
      <div className="text-[10px] text-[var(--ink-3)] mt-1">Modelo de hazard exponencial constante calibrado a partir de P(90d)</div>
    </div>
  );
}

function NotesAnalysis({ text, analysis }) {
  if (!text) return null;

  // Reconstruir texto con highlights
  const segments = [];
  let cursor = 0;
  analysis.hits.forEach(hit => {
    if (hit.start > cursor) segments.push({ text: text.slice(cursor, hit.start), highlight: null });
    segments.push({ text: text.slice(hit.start, hit.end), highlight: hit });
    cursor = hit.end;
  });
  if (cursor < text.length) segments.push({ text: text.slice(cursor), highlight: null });

  return (
    <div>
      <div className="text-[10px] uppercase tracking-widest font-semibold text-[var(--ink-3)] mb-2 flex items-center gap-1.5">
        <Icon.Layers/> Análisis automático de notas (NLP)

function AboutModel({ model, originalModel, dataset, auc, training, adaptations, onResetModel }) {
  if (!model) {
    return (
      <div className="fade-in">
        <h1 className="font-display text-4xl font-semibold tracking-tight mb-2">Acerca del modelo</h1>
        <div className="text-[var(--ink-3)] flex items-center gap-2 mt-4"><Icon.Spark/> Entrenando…</div>
      </div>
    );
  }

  // Diff de pesos: cuánto se ha movido cada coeficiente respecto al original
  const drift = useMemo(() => {
    if (!originalModel) return [];
    return model.w.map((wj, i) => ({
      name: FEATURE_NAMES[i],
      current: wj,
      original: originalModel.w[i],
      delta: wj - originalModel.w[i],
    })).sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));
  }, [model, originalModel]);

  const totalDrift = useMemo(() => {
    if (!originalModel) return 0;
    let sum = 0;
    for (let i = 0; i < model.w.length; i++) sum += Math.abs(model.w[i] - originalModel.w[i]);
    sum += Math.abs(model.b - originalModel.b);
    return sum;
  }, [model, originalModel]);

  const coeffs = model.w
    .map((w, i) => ({ name: FEATURE_NAMES[i], w }))
    .sort((a, b) => Math.abs(b.w) - Math.abs(a.w));
  const maxAbs = Math.max(...coeffs.map(c => Math.abs(c.w)));

  const hasAdaptations = adaptations && adaptations.length > 0;
  const positiveAdapts = (adaptations || []).filter(a => a.y === 1).length;
  const negativeAdapts = (adaptations || []).filter(a => a.y === 0).length;

  const handleReset = () => {
    if (window.confirm('¿Restablecer el modelo a sus pesos originales? Se descartarán todas las adaptaciones aprendidas de las decisiones humanas.')) {
      onResetModel();
    }
  };

  return (
    <div className="fade-in">
      <header className="mb-8 flex items-end justify-between gap-6">
        <div>
          <div className="text-[11px] uppercase tracking-widest text-[var(--ink-3)] font-semibold mb-1">Transparencia algorítmica</div>
          <h1 className="font-display text-4xl font-semibold tracking-tight">Acerca del modelo</h1>
          <p className="text-[var(--ink-2)] mt-2 max-w-2xl">El sistema combina dos motores: un sistema basado en reglas (auditable) y un modelo de regresión logística entrenado en el navegador, que además se adapta de forma incremental con cada decisión humana clara.</p>
        </div>
        {hasAdaptations && (
          <button onClick={handleReset} className="px-3 py-2 text-xs font-semibold border hairline rounded-md hover:bg-[var(--paper-2)] text-[var(--high-fg)] flex items-center gap-1.5 shrink-0">
            <Icon.X/> Restablecer modelo
          </button>
        )}
      </header>

      <div className="grid grid-cols-12 gap-4 mb-8">
        <KpiCard col="col-span-3" label="Algoritmo"        value="LogReg" accent="var(--primary)" sub="con regularización L2"/>
        <KpiCard col="col-span-3" label="Muestras entren." value={dataset.length} accent="var(--ink)" sub="pacientes sintéticos"/>
        <KpiCard col="col-span-3" label="AUC ROC"          value={auc.toFixed(3)} accent="var(--sage)" sub="poder discriminativo"/>
        <KpiCard col="col-span-3" label="Adaptaciones"     value={adaptations ? adaptations.length : 0} accent={hasAdaptations ? 'var(--accent-2)' : 'var(--ink-3)'} sub="updates online aplicados"/>
      </div>

      {/* Adaptaciones online */}
      {hasAdaptations && (
        <section className="mb-8 border hairline rounded-md bg-white">
          <div className="px-6 py-4 border-b hairline">
            <div className="text-[10px] uppercase tracking-widest font-semibold text-[var(--ink-3)] flex items-center gap-1.5">
              <Icon.Pulse/> Aprendizaje online
            </div>
            <h2 className="font-display text-xl font-semibold mt-0.5">Cómo ha cambiado el modelo con las decisiones</h2>
            <div className="text-xs text-[var(--ink-3)] mt-1">
              {positiveAdapts} señal(es) positiva(s) · {negativeAdapts} negativa(s) · drift acumulado <span className="font-mono font-semibold text-[var(--ink)]">{totalDrift.toFixed(3)}</span>
            </div>
          </div>

          <div className="grid grid-cols-2">
            {/* Drift de coeficientes */}
            <div className="p-6 border-r hairline">
              <div className="text-[10px] uppercase tracking-widest font-semibold text-[var(--ink-3)] mb-3">Coeficientes que más han cambiado</div>
              <div className="space-y-2">
                {drift.slice(0, 7).map(d => (
                  <div key={d.name} className="flex items-center gap-3 text-xs">
                    <div className="w-40 text-[var(--ink-2)] truncate">{d.name}</div>
                    <div className="flex-1 font-mono">
                      <span className="text-[var(--ink-3)]">{d.original.toFixed(3)}</span>
                      <span className="mx-1 text-[var(--ink-3)]">→</span>
                      <span className="font-semibold">{d.current.toFixed(3)}</span>
                    </div>
                    <span className={cls('font-mono font-semibold w-16 text-right',
                      Math.abs(d.delta) < 0.001 ? 'text-[var(--ink-3)]' :
                      d.delta > 0 ? 'text-[var(--high-fg)]' : 'text-[var(--sage)]')}>
                      {d.delta >= 0 ? '+' : ''}{d.delta.toFixed(3)}
                    </span>
                  </div>
                ))}
              </div>
            </div>

            {/* Histórico de adaptaciones */}
            <div className="p-6">
              <div className="text-[10px] uppercase tracking-widest font-semibold text-[var(--ink-3)] mb-3">Histórico de feedback</div>
              <div className="space-y-1.5 max-h-64 overflow-auto scrollbar pr-1">
                {[...adaptations].reverse().map((a, i) => (
                  <div key={i} className="flex items-center gap-2 text-xs px-2 py-1.5 rounded" style={{ background:'var(--paper-2)' }}>
                    <span className={cls('w-1.5 h-1.5 rounded-full shrink-0', a.y === 1 ? 'bg-[var(--high-fg)]' : 'bg-[var(--sage)]')}/>

                    <span className="text-[10px] text-[var(--ink-3)] font-mono shrink-0">{fmtDate(a.ts)}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      )}

      {!hasAdaptations && (
        <section className="mb-8 border hairline rounded-md bg-[var(--paper-2)] p-6 text-sm text-[var(--ink-2)]">
          <div className="flex items-start gap-3">
            <Icon.Pulse/>
            <div>
              <div className="font-semibold text-[var(--ink)] mb-1">Aprendizaje online activado</div>
              <div className="text-xs">El modelo se adapta automáticamente con cada decisión confirmada o descartada en pacientes de riesgo alto/bajo. Aún no hay ninguna adaptación registrada — registre alguna decisión para verlo en acción.</div>
            </div>
          </div>
        </section>
      )}

      <div className="grid grid-cols-12 gap-6">
        <section className="col-span-7 border hairline bg-white rounded-md">
          <div className="px-6 py-4 border-b hairline">
            <h2 className="font-display text-xl font-semibold">Coeficientes actuales</h2>
            <div className="text-xs text-[var(--ink-3)] mt-0.5">Magnitud y signo del impacto de cada variable en el log-odds</div>
          </div>
          <div className="p-6 space-y-2">
            {coeffs.map(c => (
              <div key={c.name} className="flex items-center gap-3">
                <div className="w-48 text-xs text-[var(--ink-2)]">{c.name}</div>
                <div className="flex-1 relative h-5">
                  <div className="absolute inset-y-0 left-1/2 w-px bg-[var(--line-2)]"/>
                  <div className="absolute inset-y-0.5 rounded"
                       style={{
                         left: c.w >= 0 ? '50%' : `${50 - (Math.abs(c.w)/maxAbs)*45}%`,
                         width: `${(Math.abs(c.w)/maxAbs)*45}%`,
                         background: c.w >= 0 ? 'var(--high-fg)' : 'var(--sage)',

                       }}/>
                </div>
                <div className="w-16 text-right font-mono number-display text-xs">{c.w >= 0 ? '+' : ''}{c.w.toFixed(3)}</div>
              </div>
            ))}
            <div className="pt-2 mt-2 border-t hairline flex items-center gap-3">
              <div className="w-48 text-xs text-[var(--ink-3)]">Intercept (b)</div>
              <div className="flex-1"></div>
              <div className="w-16 text-right font-mono number-display text-xs">{model.b.toFixed(3)}</div>
            </div>
          </div>
        </section>

        <section className="col-span-5 border hairline bg-white rounded-md">
          <div className="px-6 py-4 border-b hairline">
            <h2 className="font-display text-xl font-semibold">Curva de pérdida</h2>
            <div className="text-xs text-[var(--ink-3)] mt-0.5">Cross-entropy media por época durante el entrenamiento offline</div>
          </div>
          <div className="p-6">
            <LossCurve history={originalModel ? originalModel.lossHistory : model.lossHistory}/>
          </div>
        </section>
      </div>

      <section className="mt-6 border hairline bg-[var(--paper-2)] rounded-md p-6 text-sm text-[var(--ink-2)] leading-relaxed">
        <div className="font-display text-lg font-semibold text-[var(--ink)] mb-2">Limitaciones honestas</div>
        <ul className="space-y-1.5 list-disc pl-5">
          <li>El dataset de entrenamiento es <strong>sintético</strong>, generado con una distribución conocida. Las métricas son optimistas porque el modelo aprende la misma función que generó los datos.</li>
          <li>El aprendizaje online actualiza pesos con SGD <code className="font-mono text-xs">(lr=0.02)</code> a partir de señales implícitas (decisiones humanas), no de outcomes clínicos reales. En producción, idealmente se reentrenaría periódicamente con resultados verificados.</li>
          <li>Solo se actualizan los pesos cuando la decisión es interpretable sin ambigüedad: <em>confirmada</em> en alto/bajo o <em>descartada</em> en alto. <em>Modificada</em> y nivel <em>medio</em> se ignoran para evitar ruido.</li>
          <li>La probabilidad temporal asume un hazard constante, una simplificación habitual que no captura aceleraciones del riesgo.</li>
        </ul>
      </section>
    </div>
  );
}

function LossCurve({ history }) {
  if (!history || history.length === 0) return null;
  const w = 280, h = 140, padX = 20, padY = 14;
  const min = Math.min(...history), max = Math.max(...history);
  const range = max - min || 1;
  const x = i => padX + (i / (history.length - 1)) * (w - 2 * padX);
  const y = v => h - padY - ((v - min) / range) * (h - 2 * padY);
  const path = history.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(v)}`).join(' ');

  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
      <line x1={padX} y1={h - padY} x2={w - padX} y2={h - padY} stroke="var(--line)"/>
      <line x1={padX} y1={padY} x2={padX} y2={h - padY} stroke="var(--line)"/>
      <path d={path} fill="none" stroke="var(--primary)" strokeWidth="1.5"/>
      <text x={padX} y={padY - 2} style={{ fontSize:9, fill:'var(--ink-3)' }}>{max.toFixed(3)}</text>
      <text x={padX} y={h - 2} style={{ fontSize:9, fill:'var(--ink-3)' }}>{min.toFixed(3)}</text>
      <text x={w - padX} y={h - 2} textAnchor="end" style={{ fontSize:9, fill:'var(--ink-3)' }}>época {history.length}</text>
    </svg>
  );
}

  // === Entrenamiento + replay de adaptaciones al cargar ===
  useEffect(() => {
    const id = setTimeout(() => {
      const dataset = generateSyntheticDataset(500);
      const original = trainLogisticRegression(dataset, { epochs: 250, lr: 0.15, lambda: 0.005 });
      const auc = computeAUC(original, dataset);

      // Replay: aplicar las adaptaciones guardadas en orden cronológico
      const savedAdaptations = Storage.loadAdaptations();
      let adapted = { ...original, w: [...original.w] };
      savedAdaptations.forEach(a => { adapted = onlineUpdate(adapted, a.x, a.y); });

      setMlState({
        model: adapted,
        originalModel: original,
        dataset, auc,
        adaptations: savedAdaptations,
      });
    }, 50);
    return () => clearTimeout(id);
  }, []);

  const scored = useMemo(
    () => patients.map(p => ({ patient: p, ...calculateRisk(p) })),
    [patients]
  );

  const scoreFn = (p) => ({ patient: p, ...calculateRisk(p) });

  const mlProbs = useMemo(() => {
    if (!mlState.model) return {};
    const out = {};
    patients.forEach(p => { out[p.id] = predictProb(mlState.model, vectorize(p)); });
    return out;
  }, [mlState.model, patients]);

  const counts = { total: patients.length };

  const openPatient = (id) => { setActiveId(id); setView('detail'); };
  const editPatient = (id) => { setActiveId(id); setView('edit'); };

  const upsertPatient = (p) => {
    setPatients(prev => {
      const exists = prev.find(x => x.id === p.id);
      if (exists) return prev.map(x => x.id === p.id ? p : x);
      return [...prev, p];
    });
    setActiveId(p.id);
    setView('detail');
  };

  // === Registrar decisión + posible online update del modelo ===
  const recordDecision = (id, decision) => {
    setPatients(prev => prev.map(p => {
      if (p.id !== id) return p;
      const historial = [...(p.historial || []), decision];
      return { ...p, decision, historial };
    }));

    // Derivar outcome implícito y aplicar SGD si hay señal clara
    const patient = patients.find(p => p.id === id);
    if (!patient || !mlState.model) return;
    const ruleLevel = calculateRisk(patient).level;
    const yImplicit = deriveImplicitOutcome(decision.tipo, ruleLevel);
    if (yImplicit === null) return;

    const x = vectorize(patient);
    const adaptation = {
      ts: decision.ts, patientId: id, patientName: patient.nombre,
      x, y: yImplicit, decisionType: decision.tipo, ruleLevel,
    };

    setMlState(prev => {
      if (!prev.model) return prev;
      const updated = onlineUpdate(prev.model, x, yImplicit);
      const newAdaptations = [...prev.adaptations, adaptation];
      Storage.saveAdaptations(newAdaptations);
      return { ...prev, model: updated, adaptations: newAdaptations };
    });

    // Toast efímero
    setLastAdaptation(adaptation);
    setTimeout(() => setLastAdaptation(curr => curr === adaptation ? null : curr), 4000);
  };

  // === Reset del modelo (vuelve al original) ===
  const resetModel = () => {
    setMlState(prev => {
      if (!prev.originalModel) return prev;
      Storage.saveAdaptations([]);
      return {
        ...prev,
        model: { ...prev.originalModel, w: [...prev.originalModel.w] },
        adaptations: [],
      };
    });
  };

  // === Reset completo (datos + modelo) ===
  const resetAll = () => {
    Storage.clearAll();
    setPatients(SEED_PATIENTS);
    resetModel();
    setActiveId(null);
    setView('dashboard');
  };

  const activeScored = activeId ? scored.find(s => s.patient.id === activeId) : null;

  return (
    <div className="min-h-screen flex grain">
      <Sidebar view={view} setView={setView} counts={counts} onReset={resetAll}/>
      <main className="flex-1 overflow-auto scrollbar relative">
        <div className="max-w-7xl mx-auto px-10 py-10">
          {view === 'dashboard' && <Dashboard patients={patients} scored={scored} setView={setView} openPatient={openPatient} mlProbs={mlProbs} adaptations={mlState.adaptations}/>}
          {view === 'patients'  && <PatientsList scored={scored} openPatient={openPatient} mlProbs={mlProbs}/>}
          {view === 'new'       && <PatientForm onSave={upsertPatient} onCancel={() => setView('dashboard')} mode="nuevo" model={mlState.model}/>}
          {view === 'edit' && activeScored && <PatientForm initial={activeScored.patient} onSave={upsertPatient} onCancel={() => setView('detail')} mode="edicion" model={mlState.model}/>}
          {view === 'detail' && activeScored && (
            <PatientDetail
              scored={activeScored}
              onBack={() => setView('patients')}
              onEdit={() => editPatient(activeScored.patient.id)}
              onDecision={recordDecision}
              model={mlState.model}
              prob90={mlProbs[activeScored.patient.id]}
              cohort={patients}
              scoreFn={scoreFn}
              openPatient={openPatient}
            />
          )}
          {view === 'model' && (
            <AboutModel
              model={mlState.model}
              originalModel={mlState.originalModel}
              dataset={mlState.dataset || []}
              auc={mlState.auc || 0.5}
              training={{ epochs: 250 }}
              adaptations={mlState.adaptations}
              onResetModel={resetModel}
            />
          )}
        </div>
        <footer className="border-t hairline px-10 py-6 text-xs text-[var(--ink-3)] flex items-center justify-between">
          <span>Lince — prototipo de demostración. Datos sintéticos, sin información real de pacientes.</span>
          <span className="font-mono">v0.3 · Reglas + ML adaptativo · Persistencia local</span>
        </footer>
        {lastAdaptation && <AdaptationToast adaptation={lastAdaptation}/>}
      </main>
    </div>
  );
}

function AdaptationToast({ adaptation }) {
  return (
    <div className="fixed bottom-6 right-6 z-50 fade-in border hairline-strong rounded-md shadow-lg overflow-hidden" style={{ background:'var(--paper)', maxWidth: 360 }}>
      <div className="px-4 py-3 border-b hairline flex items-center gap-2" style={{ background:'var(--primary)', color:'var(--paper)' }}>
        <Icon.Brain/>
        <span className="text-sm font-semibold">Modelo actualizado</span>
      </div>
      <div className="px-4 py-3 text-sm">
        <div>El modelo ha aprendido de su decisión sobre <span className="font-semibold">{adaptation.patientName}</span>.</div>
        <div className="text-xs text-[var(--ink-3)] mt-1 flex items-center gap-2">
          <DecisionTag tipo={adaptation.decisionType}/>
          <span>· señal y={adaptation.y}</span>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
